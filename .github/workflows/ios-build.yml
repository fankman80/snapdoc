name: Build MAUI iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Workloads
        run: |
          dotnet workload install maui-ios
          dotnet workload restore

      - name: Select Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_26.2.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Import Certificate (.p12)
        run: |
          # 1. Decode aus Secret
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          echo "${{ secrets.IOS_PROVISION_BASE64 }}" | base64 --decode > profile.mobileprovision
          
          # 2. Temporären Schlüsselbund erstellen
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 21)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          
          # 3. Zertifikat importieren
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "${{ secrets.IOS_CERT_PASSWORD }}" -A -t cert -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          
          # 4. Provisioning Profile in den richtigen Ordner schieben
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build and Sign IPA
        run: |
          dotnet publish SnapDoc/SnapDoc.csproj -f net10.0-ios -c Release \
          -p:ArchiveOnBuild=true \
          -p:CodesignKey="Apple Distribution" \
          -p:CodesignProvision="MAUI_AppStore_Distribution" \
          -p:RuntimeIdentifier=ios-arm64 \
          -p:MtouchNoWarn=7091 \
          -p:SuppressXCodeVersionMismatch=true

      - name: Fix IPA Structure and RE-SIGN with Entitlements
        run: |
          unzip SnapDoc/bin/Release/net10.0-ios/ios-arm64/publish/SnapDoc.ipa -d temp_ipa
          codesign -d --entitlements :- "temp_ipa/Payload/SnapDoc.app" > entitlements.xml
          mkdir -p temp_ipa/Payload/SnapDoc.app/Frameworks
          if [ -f "temp_ipa/Payload/SnapDoc.app/libpdfium.dylib" ]; then
            mv temp_ipa/Payload/SnapDoc.app/libpdfium.dylib temp_ipa/Payload/SnapDoc.app/Frameworks/
          fi
          cp /Applications/Xcode_16.2.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/iphoneos/libswift*.dylib temp_ipa/Payload/SnapDoc.app/Frameworks/ || true
          mkdir -p temp_ipa/SwiftSupport/iphoneos
          cp temp_ipa/Payload/SnapDoc.app/Frameworks/libswift*.dylib temp_ipa/SwiftSupport/iphoneos/ || true
          /usr/bin/codesign --force --sign "Apple Distribution" --timestamp --options runtime temp_ipa/Payload/SnapDoc.app/Frameworks/*.dylib || true
          /usr/bin/codesign --force --sign "Apple Distribution" --entitlements entitlements.xml --timestamp --options runtime temp_ipa/Payload/SnapDoc.app
          cd temp_ipa
          zip -y -r ../SnapDoc_Fixed.ipa .
          cd ..
          mv SnapDoc_Fixed.ipa SnapDoc/bin/Release/net10.0-ios/ios-arm64/publish/SnapDoc.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapDoc-iOS-App
          path: SnapDoc/bin/Release/net10.0-ios/ios-arm64/publish/*.ipa

      - name: Upload to App Store Connect (TestFlight)
        run: |
          # Dieses Tool lädt die .ipa direkt zu Apple hoch
          xcrun altool --upload-app \
            -f SnapDoc/bin/Release/net10.0-ios/ios-arm64/publish/*.ipa \
            -t ios \
            -u "m.fankhauser@gmx.net" \
            -p "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
