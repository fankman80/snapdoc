name: Build MAUI iOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Das erlaubt dir, den Build manuell unter "Actions" zu starten

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI Workload
        run: dotnet workload install maui-ios

      - name: Decode Signing Files
        run: |
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 --decode > certificate.p12
          echo "${{ secrets.IOS_PROVISION_BASE64 }}" | base64 --decode > profile.mobileprovision

      - name: Build and Sign IPA
        run: |
          dotnet publish -f net8.0-ios -c Release \
          -p:ArchiveOnBuild=true \
          -p:CodesignKey="Apple Distribution" \
          -p:CodesignProvision="MAUI_AppStore_Distribution" \
          -p:CodesignEntitlements="Platforms/iOS/Entitlements.plist"
